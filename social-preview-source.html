<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChongGrok AI 会员指南预览图</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1200px; height: 630px; overflow: hidden; color: #11191d; background: #f4f7f5; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
    .canvas { width: 1200px; height: 630px; display: grid; grid-template-columns: 1.1fr .9fr; border: 18px solid #fff; }
    .copy { padding: 62px 52px; display: flex; flex-direction: column; justify-content: center; background: #fff; }
    .mark { display: inline-grid; width: 48px; height: 48px; place-items: center; border-radius: 6px; color: #fff; background: #0b6b52; font-size: 15px; font-weight: 800; }
    .eyebrow { margin: 22px 0 12px; color: #0b6b52; font-size: 18px; font-weight: 800; letter-spacing: 2px; }
    h1 { margin: 0; max-width: 610px; font-size: 54px; line-height: 1.18; letter-spacing: 0; }
    p { margin: 22px 0 0; max-width: 600px; color: #506067; font-size: 23px; line-height: 1.55; }
    .products { padding: 46px; display: grid; align-content: center; gap: 18px; background: #eaf2ee; }
    .product { min-height: 184px; padding: 28px; border: 1px solid #c8d8d1; border-radius: 7px; background: #fff; }
    .product small { color: #0b6b52; font-size: 15px; font-weight: 800; letter-spacing: 1px; }
    .product h2 { margin: 10px 0 6px; font-size: 30px; line-height: 1.25; }
    .product span { color: #5f6b70; font-size: 18px; }
    .product.grok { border-left: 6px solid #202a31; }
    .product.chatgpt { border-left: 6px solid #0b6b52; }
  </style>
</head>
<body>
  <main class="canvas">
    <section class="copy">
      <div class="mark">CG</div>
      <div class="eyebrow">CHONGGROK KNOWLEDGE HUB</div>
      <h1>AI 会员订阅<br>充值与报错指南</h1>
      <p>结构清晰的 ChatGPT 与 SuperGrok 知识库入口</p>
    </section>
    <section class="products">
      <div class="product chatgpt">
        <small>OPENAI / CHATGPT</small>
        <h2>ChatGPT Plus / Pro</h2>
        <span>充值 · 付款失败 · 续费 · Free 状态</span>
      </div>
      <div class="product grok">
        <small>XAI / GROK</small>
        <h2>SuperGrok</h2>
        <span>User ID · 付款报错 · 403 · Grok 4.5</span>
      </div>
    </section>
  </main>
</body>
</html>
